{% extends "base.html" %}

{% block title %}Create Group - CollabSpace{% endblock %}
{% block page_title %}Create Group{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">Create a New Group</div>
    <div class="card-body">
        <form action="{{ url_for('groups.create') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="name">Group Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Marketing Team" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="4" placeholder="What is this group for?"></textarea>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Create Group</button>
                <a href="{{ url_for('groups.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
