{% extends "base.html" %}

{% block title %}Join Group - CollabSpace{% endblock %}
{% block page_title %}Join Group{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">Join an Existing Group</div>
    <div class="card-body">
        <form action="{{ url_for('groups.join') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="invite_code">Invite Code</label>
                <input type="text" id="invite_code" name="invite_code" class="form-control" placeholder="e.g. A1B2C3D4" required style="text-transform: uppercase;">
                <div style="font-size: 0.8rem; color: var(--color-text-secondary); margin-top: 8px;">
                    Ask an admin or editor of the group for an invite code to join.
                </div>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Join Group</button>
                <a href="{{ url_for('groups.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
