name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Set test environment variables
      run: |
        echo "APP_ENV=testing" >> $GITHUB_ENV
        echo "SECRET_KEY=test-secret" >> $GITHUB_ENV
        echo "JWT_SECRET_KEY=test-jwt-secret" >> $GITHUB_ENV
    
    - name: Run tests
      run: |
         export PYTHONPATH=$PYTHONPATH:./collabspace
         pytest collabspace/tests/ -v --tb=short
    
    - name: Generate coverage report
  run: |
    pip install coverage
    export PYTHONPATH=$PYTHONPATH:./collabspace
    coverage run -m pytest collabspace/tests/
    coverage report -m
    coverage xml
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
